<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="SAT vocabulary trainer — 1,700+ words with spaced repetition, sentence completion, and SAT-style practice questions.">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
<title>SAT Vocabulary Quiz</title>
<script>
// Apply theme before first paint to avoid a light-mode flash for dark users.
(function(){
  try {
    var t = localStorage.getItem('sat_theme');
    if (!t && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) t = 'dark';
    if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  } catch (e) {}
})();
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<header>
<div class="header-center">
<h1>SAT Vocabulary Trainer</h1>
</div>
<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle dark mode" title="Toggle dark mode">&#9790;</button>
</header>
<div class="nav">
<button id="navQuiz" class="active" onclick="showView('quiz')">Practice</button>
<button id="navWords" onclick="showView('words')">Words</button>
<button id="navReview" onclick="showView('review')">Review</button>
<button id="navStats" onclick="showView('stats')">Record</button>
<button id="navCal" onclick="showView('calendar')">Calendar</button>
<button id="navSettings" onclick="showView('settings')">Settings</button>
</div>
<div id="quizView">
<div id="dailyBanner" class="daily-banner"></div>
<div id="startScreen" class="start-screen"></div>
<div id="quizActive" class="hidden">
<div class="timer-top" id="timerTop">
<div class="timer-content" id="timerContent">
<div class="timer-bar-track"><div class="timer-bar-fill" id="timerBar"></div></div>
<span class="timer-text" id="timerText"></span>
<button class="timer-hide-btn" onclick="hideTimer()" title="Hide timer" aria-label="Hide timer">&times;</button>
</div>
<div class="timer-show" id="timerShow" style="display:none">
<button class="timer-show-btn" onclick="showTimerBar()">Show timer</button>
</div>
</div>
<div class="exit-row">
<button class="info-btn" onclick="toggleInfo()" aria-label="Keyboard shortcuts" title="Shortcuts">i</button>
<button class="exit-btn" onclick="exitSession()">Save &amp; Exit</button>
</div>
<div class="info-panel hidden" id="infoPanel">
<table>
<tr><td>Click</td><td>Select answer</td></tr>
<tr><td>Right-click</td><td>Cross out option</td></tr>
<tr><td>Enter</td><td>Check answer / Continue</td></tr>
<tr><td>1 – 4</td><td>Select option A – D</td></tr>
<tr><td>Esc</td><td>Save &amp; exit</td></tr>
</table>
</div>
<div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
<div class="stats-row">
<span id="qNum">Question 1 / 20</span>
<span id="scoreDisp">Score: 0</span>
<span id="streakDisp">Streak: 0</span>
</div>
<div class="question-card" id="qCard">
<div class="q-type" id="qType"></div>
<div class="q-text" id="qText"></div>
<div class="options" id="optionsDiv"></div>
</div>
<button class="check-btn" id="checkBtn" onclick="checkAnswer()">Check Answer</button>
<div class="feedback" id="feedback" aria-live="polite" role="status"></div>
<button class="next-btn" id="nextBtn" onclick="nextQuestion()">Continue</button>
</div>
<div id="summaryView" class="hidden"></div>
</div>
<div id="calendarView" class="hidden"></div>
<div id="reviewView" class="hidden"></div>
<div id="statsView" class="hidden"></div>
<div id="settingsView" class="hidden"></div>
<div id="wordsView" class="hidden"></div>
</div>
<script src="words.js"></script>
<script src="templates.js"></script>
<script src="sentences.js"></script>
<script src="app.js"></script>
</body>
</html>
