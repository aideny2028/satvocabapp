<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAT Vocabulary Quiz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--paper:#f3f0e7;--ink:#0b1026;--accent:#d8542f;--accent2:#1f6f6b;--gold:#c79a3a;--good:#1f6f6b;--bad:#b23b2e;--line:#cfc7b3;--paper-tint:#ece8dd;--good-tint:#e4f0ee;--bad-tint:#f5e4e2}
body{font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,'Times New Roman',serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;-webkit-font-smoothing:antialiased}
.container{max-width:640px;width:100%;padding:32px 24px}
header{text-align:center;margin-bottom:28px;border-bottom:2px solid var(--ink);padding-bottom:20px}
header h1{font-size:1.6rem;font-weight:400;font-style:italic;letter-spacing:.5px}
header p{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:3px;opacity:.35;margin-top:8px}
.nav{display:flex;gap:0;margin-bottom:28px}
.nav button{flex:1;background:var(--paper);border:2px solid var(--ink);border-left:none;padding:10px 8px;font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:2px;cursor:pointer;transition:.15s;color:var(--ink)}
.nav button:first-child{border-left:2px solid var(--ink)}
.nav button:hover{background:var(--ink);color:var(--paper)}
.nav button.active{background:var(--ink);color:var(--paper)}
.hidden{display:none!important}
.start-screen{text-align:center}
.start-screen h2{font-size:1.2rem;font-weight:400;font-style:italic;margin-bottom:12px}
.start-screen p{font-size:.9rem;opacity:.55;line-height:1.6;margin-bottom:24px}
.start-screen>button{background:var(--ink);color:var(--paper);border:2px solid var(--ink);padding:14px 48px;font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:3px;cursor:pointer;transition:.15s;border-radius:0}
.start-screen>button:hover{background:var(--accent);border-color:var(--accent)}
.progress-bar{height:6px;border:1px solid var(--line);background:var(--paper-tint);margin-bottom:16px}
.progress-fill{height:100%;background:var(--accent2);transition:width .3s ease}
.stats-row{display:flex;justify-content:space-between;font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:1px;opacity:.4;margin-bottom:16px}
.question-card{border:2px solid var(--ink);padding:28px 24px;margin-bottom:16px}
.q-type{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:3px;color:var(--accent);margin-bottom:8px}
.q-word{font-size:1.6rem;font-weight:700;font-style:italic;display:block;margin:12px 0 4px}
.q-pos{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.7rem;opacity:.35;font-style:italic;margin-bottom:8px}
.q-text{font-size:1.1rem;line-height:1.6;margin-top:10px}
.retry-badge{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.55rem;background:var(--gold);color:var(--paper);padding:2px 8px;margin-left:10px;text-transform:uppercase;letter-spacing:1.5px;vertical-align:middle}
.options{display:flex;flex-direction:column;gap:0;margin-top:20px}
.option{border:1px solid var(--line);padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:.15s;font-size:.92rem}
.option:hover{background:var(--paper-tint);border-color:var(--ink)}
.option .letter{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-weight:700;font-size:.75rem;width:20px;flex-shrink:0}
.option.correct.show-correct{background:var(--good-tint);border-color:var(--good);font-weight:700}
.option.wrong{background:var(--bad-tint);border-color:var(--bad);opacity:.7}
.option.disabled{pointer-events:none}
.feedback{text-align:center;padding:16px;margin-top:16px;font-style:italic;font-size:.95rem}
.correct-fb{color:var(--good)}
.wrong-fb{color:var(--bad)}
.next-btn{display:none;width:100%;background:var(--ink);color:var(--paper);border:2px solid var(--ink);padding:14px;font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;cursor:pointer;margin-top:12px;border-radius:0}
.next-btn:hover{background:var(--accent);border-color:var(--accent)}
.kb-hint{text-align:center;font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.55rem;opacity:.25;margin-top:12px;letter-spacing:.5px}
.summary{border:2px solid var(--ink);padding:32px 24px;text-align:center}
.summary h2{font-size:1.2rem;font-weight:400;font-style:italic}
.score-big{font-size:3rem;font-weight:700;font-style:italic;margin:16px 0}
.score-big .of{font-size:1.2rem;opacity:.3;font-weight:400}
.summary-btns{display:flex;gap:12px;justify-content:center;margin-top:24px}
.summary-btns button{background:var(--ink);color:var(--paper);border:2px solid var(--ink);padding:12px 28px;font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;cursor:pointer;border-radius:0;transition:.15s}
.summary-btns button:hover{background:var(--accent);border-color:var(--accent)}
.summary-btns button.secondary{background:var(--paper);color:var(--ink)}
.summary-btns button.secondary:hover{background:var(--ink);color:var(--paper)}
.missed-list{text-align:left;margin-top:24px;border-top:1px solid var(--line);padding-top:16px}
.missed-list h3{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:2px;color:var(--bad);margin-bottom:12px}
.missed-item{padding:8px 0;border-bottom:1px solid var(--line);font-size:.88rem}
.missed-item .mw{font-weight:700;font-style:italic;color:var(--accent)}
.missed-item .md{opacity:.55}
.dash{border:2px solid var(--ink);padding:28px 24px}
.dash h2{text-align:center;font-size:1.2rem;font-weight:400;font-style:italic;margin-bottom:20px}
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0}
.dash-stat{text-align:center;padding:16px 8px;border-right:1px solid var(--line)}
.dash-stat:last-child{border-right:none}
.dash-stat .num{font-size:1.8rem;font-weight:700;font-style:italic}
.dash-stat .label{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:2px;opacity:.4;margin-top:4px}
.most-missed{margin-top:24px;border-top:1px solid var(--line);padding-top:16px}
.most-missed h3{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:2px;color:var(--bad);margin-bottom:12px}
.mm-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:.85rem}
.mm-item .count{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.75rem;color:var(--bad);font-weight:700}
.reset-btn{text-align:center;margin-top:24px}
.reset-btn button{background:var(--paper);color:var(--bad);border:1px solid var(--bad);padding:8px 20px;font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;border-radius:0;transition:.15s}
.reset-btn button:hover{background:var(--bad);color:var(--paper)}
.settings{border:2px solid var(--ink);padding:28px 24px;margin-bottom:24px}
.settings h3{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:3px;color:var(--accent);margin-bottom:16px;font-weight:400}
.chk-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);cursor:pointer;-webkit-user-select:none;user-select:none}
.chk-row:last-child{border-bottom:none}
.chk-row input[type=checkbox]{-webkit-appearance:none;appearance:none;width:18px;height:18px;border:2px solid var(--ink);background:var(--paper);cursor:pointer;flex-shrink:0;position:relative}
.chk-row input[type=checkbox]:checked{background:var(--ink)}
.chk-row input[type=checkbox]:checked::after{content:'';position:absolute;left:4px;top:1px;width:5px;height:9px;border:solid var(--paper);border-width:0 2px 2px 0;transform:rotate(45deg)}
.chk-row label{cursor:pointer;font-size:.9rem;flex:1}
.chk-row .chk-desc{font-size:.75rem;opacity:.45;font-style:italic;display:block;margin-top:2px}
.word-pool-info{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:1.5px;opacity:.4;text-align:center;margin:12px 0 20px;padding:10px;border:1px solid var(--line)}
.exit-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.exit-btn{background:var(--paper);color:var(--ink);opacity:.4;border:1px solid var(--line);padding:5px 14px;border-radius:0;font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.6rem;cursor:pointer;text-transform:uppercase;letter-spacing:1.5px;transition:.15s}
.exit-btn:hover{opacity:1;border-color:var(--ink)}
.exit-btn:active{transform:translateY(1px)}
.review{border:2px solid var(--ink);padding:28px 24px}
.review h2{font-size:1.2rem;margin-bottom:8px;text-align:center;font-weight:400;font-style:italic}
.review-sub{text-align:center;opacity:.45;font-size:.85rem;margin-bottom:24px}
.review-empty{text-align:center;padding:40px 20px;opacity:.4;font-style:italic}
.review-word{border-bottom:1px solid var(--line);padding:12px 0;display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.review-word:last-child{border-bottom:none}
.review-word .rw-term{font-weight:700;font-style:italic;color:var(--accent);min-width:120px;flex-shrink:0}
.review-word .rw-pos{font-size:.8rem;opacity:.35;font-style:italic;margin-left:6px}
.review-word .rw-def{flex:1;opacity:.7;font-size:.9rem;line-height:1.5}
.review-word .rw-count{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.7rem;color:var(--bad);font-weight:700;flex-shrink:0}
.review-actions{display:flex;gap:12px;justify-content:center;margin-top:24px;padding-top:16px;border-top:1px solid var(--line);flex-wrap:wrap}
.review-actions button{background:var(--paper);color:var(--ink);border:2px solid var(--ink);padding:10px 24px;border-radius:0;cursor:pointer;font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;transition:.15s}
.review-actions button:hover{background:var(--ink);color:var(--paper)}
.review-actions button.teal{border-color:var(--accent2);color:var(--accent2)}
.review-actions button.teal:hover{background:var(--accent2);color:var(--paper)}
.review-actions button.danger{border-color:var(--bad);color:var(--bad)}
.review-actions button.danger:hover{background:var(--bad);color:var(--paper)}
.review-filter{display:flex;gap:0;margin-bottom:20px}
.review-filter button{flex:1;background:var(--paper);border:2px solid var(--ink);border-left:none;padding:8px;font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;transition:.15s}
.review-filter button:first-child{border-left:2px solid var(--ink)}
.review-filter button:hover{background:var(--ink);color:var(--paper)}
.review-filter button.active{background:var(--ink);color:var(--paper)}
.daily-banner{border:2px solid var(--ink);padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.daily-banner .db-left{flex:1;min-width:180px}
.daily-banner .db-label{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:2px;opacity:.4;margin-bottom:6px}
.daily-banner .db-count{font-size:1.6rem;font-weight:700;font-style:italic}
.daily-banner .db-count .of{font-size:.9rem;opacity:.35;font-weight:400}
.daily-banner .db-bar{flex:2;min-width:140px}
.daily-banner .db-bar-track{height:22px;border:2px solid var(--ink);background:var(--paper-tint);position:relative;overflow:hidden}
.daily-banner .db-bar-fill{height:100%;background:var(--accent2);transition:width .4s ease}
.daily-banner .db-bar-fill.complete{background:var(--gold)}
.daily-banner .db-bar-text{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.6rem;font-weight:700;letter-spacing:1px;color:var(--ink);mix-blend-mode:darken}
.daily-banner .db-streak{text-align:right;min-width:80px}
.daily-banner .db-streak-num{font-size:1.4rem;font-weight:700;color:var(--accent)}
.daily-banner .db-streak-label{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:2px;opacity:.4}
.cal{border:2px solid var(--ink);padding:24px}
.cal h2{font-size:1.2rem;margin-bottom:4px;text-align:center;font-weight:400;font-style:italic}
.cal-sub{text-align:center;opacity:.45;font-size:.85rem;margin-bottom:16px}
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cal-nav button{background:var(--paper);border:2px solid var(--ink);width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;font-weight:700;transition:.15s;border-radius:0}
.cal-nav button:hover{background:var(--ink);color:var(--paper)}
.cal-nav .cal-month{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:2px;font-weight:700}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:16px}
.cal-grid .cal-hdr{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:1px;text-align:center;padding:6px 0;opacity:.35;font-weight:700}
.cal-grid .cal-day{border:1px solid var(--line);padding:6px 4px;min-height:48px;position:relative;font-size:.8rem;text-align:center}
.cal-grid .cal-day.empty{border:none;background:transparent}
.cal-grid .cal-day.today{border:2px solid var(--accent);font-weight:700}
.cal-grid .cal-day.future{opacity:.25}
.cal-day .cd-num{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.65rem;margin-bottom:2px}
.cal-day .cd-fill{width:100%;height:4px;background:var(--paper-tint);border:1px solid var(--line);margin-top:2px}
.cal-day .cd-fill-inner{height:100%;background:var(--accent2);transition:width .3s}
.cal-day .cd-fill-inner.full{background:var(--gold)}
.cal-day .cd-check{color:var(--good);font-size:.75rem;font-weight:700;margin-top:1px}
.cal-day .cd-count{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.55rem;opacity:.5}
.cal-legend{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--line)}
.cal-legend span{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:4px;opacity:.5}
.cal-legend .leg-box{width:12px;height:12px;border:1px solid var(--line)}
.cal-legend .leg-teal{background:var(--accent2)}
.cal-legend .leg-gold{background:var(--gold)}
.streak-display{text-align:center;padding:20px;margin-bottom:16px;border:2px solid var(--ink)}
.streak-display .streak-num{font-size:2.5rem;font-weight:700;color:var(--accent)}
.streak-display .streak-label{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:3px;opacity:.4;margin-top:4px}
.streak-display .streak-best{font-family:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;font-size:.55rem;opacity:.3;margin-top:8px;letter-spacing:1px}
.q-sentence{font-size:1.1rem;line-height:1.8;margin:8px 0 4px}
.q-sentence .blank{border-bottom:2px solid var(--accent);padding:0 12px;font-weight:700;color:var(--accent)}
@media(max-width:500px){.container{padding:16px 12px}.question-card{padding:20px 16px}.q-text{font-size:1.05rem}.option{padding:12px 14px;font-size:.88rem}.dash-grid{grid-template-columns:1fr}.dash-stat{border-right:none!important;border-bottom:1px solid var(--line)!important}.dash-stat:last-child{border-bottom:none!important}.review-word{flex-direction:column;gap:4px}.review-word .rw-term{min-width:auto}}
</style>
</head>
<body>
<div class="container">
<header>
<h1>SAT Vocabulary Trainer</h1>
<p id="wordCount"></p>
</header>
<div class="nav">
<button id="navQuiz" class="active" onclick="showView('quiz')">Examination</button>
<button id="navCal" onclick="showView('calendar')">Calendar</button>
<button id="navReview" onclick="showView('review')">Review</button>
<button id="navStats" onclick="showView('stats')">Record</button>
</div>
<div id="quizView">
<div id="dailyBanner" class="daily-banner"></div>
<div id="startScreen" class="start-screen">
<h2>Start practicing</h2>
<p>Twenty words per sitting. Randomized order, randomized placement.<br>Missed entries will resurface for review.</p>
<div class="settings">
<h3>Question Types</h3>
<div class="chk-row"><input type="checkbox" id="chkWordDef" checked><label for="chkWordDef">Define the term<span class="chk-desc">Given a word, select the correct definition</span></label></div>
<div class="chk-row"><input type="checkbox" id="chkDefWord" checked><label for="chkDefWord">Identify the word<span class="chk-desc">Given a definition, select the matching word</span></label></div>
<div class="chk-row"><input type="checkbox" id="chkSentence" checked><label for="chkSentence">Sentence completion<span class="chk-desc">Fill in the blank with the word that fits the context</span></label></div>
<div class="chk-row"><input type="checkbox" id="chkSynonym" checked><label for="chkSynonym">Closest in meaning<span class="chk-desc">Select the word most similar in meaning to the given term</span></label></div>
</div>
<div id="wordPoolInfo" class="word-pool-info"></div>
<button onclick="startSession()">Commence</button>
</div>
<div id="quizActive" class="hidden">
<div class="exit-row">
<div></div>
<button class="exit-btn" onclick="exitSession()">Save &amp; Exit</button>
</div>
<div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
<div class="stats-row">
<span id="qNum">Question 1 / 20</span>
<span id="scoreDisp">Score: 0</span>
<span id="streakDisp">Streak: 0</span>
</div>
<div class="question-card" id="qCard">
<div class="q-type" id="qType"></div>
<div class="q-text" id="qText"></div>
<div class="options" id="optionsDiv"></div>
</div>
<div class="feedback" id="feedback"></div>
<button class="next-btn" id="nextBtn" onclick="nextQuestion()">Continue</button>
<div class="kb-hint">Keys 1-4 or A-D to answer · Enter to proceed · Esc to save &amp; exit</div>
</div>
<div id="summaryView" class="hidden"></div>
</div>
<div id="calendarView" class="hidden"></div>
<div id="reviewView" class="hidden"></div>
<div id="statsView" class="hidden"></div>
</div>
<script>
const W=[
{w:"abase",p:"v.",d:"to humiliate, degrade"},
{w:"abate",p:"v.",d:"to reduce, lessen"},
{w:"abdicate",p:"v.",d:"to give up a position, usually leadership"},
{w:"abduct",p:"v.",d:"to kidnap, take by force"},
{w:"aberration",p:"n.",d:"something that differs from the norm"},
{w:"abet",p:"v.",d:"to aid, help, encourage"},
{w:"abhor",p:"v.",d:"to hate, detest"},
{w:"abide",p:"v.",d:"to put up with; to remain"},
{w:"abject",p:"adj.",d:"wretched, pitiful"},
{w:"abjure",p:"v.",d:"to reject, renounce"},
{w:"abnegation",p:"n.",d:"denial of comfort to oneself"},
{w:"abort",p:"v.",d:"to give up on a half-finished project"},
{w:"abridge",p:"v.",d:"to cut down, shorten"},
{w:"abrogate",p:"v.",d:"to abolish, usually by authority"},
{w:"abscond",p:"v.",d:"to sneak away and hide"},
{w:"absolution",p:"n.",d:"freedom from blame, guilt, or sin"},
{w:"abstain",p:"v.",d:"to freely choose not to commit an action"},
{w:"abstruse",p:"adj.",d:"hard to comprehend"},
{w:"accede",p:"v.",d:"to agree"},
{w:"accentuate",p:"v.",d:"to stress, highlight"},
{w:"accessible",p:"adj.",d:"obtainable, reachable"},
{w:"acclaim",p:"n.",d:"high praise"},
{w:"accolade",p:"n.",d:"high praise, special distinction"},
{w:"accommodating",p:"adj.",d:"helpful, obliging, polite"},
{w:"accord",p:"n.",d:"an agreement"},
{w:"accost",p:"v.",d:"to confront verbally"},
{w:"accretion",p:"n.",d:"slow growth in size or amount"},
{w:"acerbic",p:"adj.",d:"biting, bitter in tone or taste"},
{w:"acquiesce",p:"v.",d:"to agree without protesting"},
{w:"acrimony",p:"n.",d:"bitterness, discord"},
{w:"acumen",p:"n.",d:"keen insight"},
{w:"acute",p:"adj.",d:"sharp or severe; having keen insight"},
{w:"adamant",p:"adj.",d:"impervious, unyielding"},
{w:"adept",p:"adj.",d:"extremely skilled"},
{w:"adhere",p:"v.",d:"to stick to; to follow devoutly"},
{w:"admonish",p:"v.",d:"to caution, criticize, reprove"},
{w:"adorn",p:"v.",d:"to decorate"},
{w:"adroit",p:"adj.",d:"skillful, dexterous"},
{w:"adulation",p:"n.",d:"extreme praise"},
{w:"adumbrate",p:"v.",d:"to sketch out vaguely"},

function defaults(){return{missCount:{},sessionsCompleted:0,totalCorrect:0,totalAnswered:0,currentSession:null,questionTypes:{wordToDef:true,defToWord:true,sentence:true,synonym:true},dailyLog:{},bestStreak:0}}
function load(){try{const s=localStorage.getItem(LS_KEY);const d=defaults();if(!s){const old=localStorage.getItem('sat_vocab_v3');if(old){const p=JSON.parse(old);return{...d,...p,dailyLog:p.dailyLog||{},bestStreak:p.bestStreak||0,questionTypes:{...d.questionTypes,...(p.questionTypes||{})}}}return d}const p=JSON.parse(s);return{...d,...p,dailyLog:p.dailyLog||{},bestStreak:p.bestStreak||0,questionTypes:{...d.questionTypes,...(p.questionTypes||{})}}}catch(e){return defaults()}}
function save(){localStorage.setItem(LS_KEY,JSON.stringify(state))}
function todayKey(){return new Date().toISOString().slice(0,10)}
function getTodayLog(){const k=todayKey();if(!state.dailyLog[k])state.dailyLog[k]={answered:0,correct:0};return state.dailyLog[k]}
function addDailyAnswer(isCorrect){const log=getTodayLog();log.answered++;if(isCorrect)log.correct++;save()}
function calcStreak(){const today=new Date();let streak=0;const d=new Date(today);const tk=todayKey();const todayDone=(state.dailyLog[tk]?.answered||0)>=DAILY_GOAL;if(!todayDone)d.setDate(d.getDate()-1);while(true){const k=d.toISOString().slice(0,10);const log=state.dailyLog[k];if(log&&log.answered>=DAILY_GOAL){streak++;d.setDate(d.getDate()-1)}else break}if(streak>state.bestStreak){state.bestStreak=streak;save()}return streak}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

function getDistractors(correct,count,type){const others=W.filter(x=>x.w!==correct.w);shuffle(others);const samePOS=others.filter(x=>x.p===correct.p);const diffPOS=others.filter(x=>x.p!==correct.p);const prioritized=[...samePOS,...diffPOS];const picks=prioritized.slice(0,count);return type==='def'?picks.map(x=>x.d):picks.map(x=>x.w)}
function getEnabledTypes(){const map={wordToDef:'chkWordDef',defToWord:'chkDefWord',sentence:'chkSentence',synonym:'chkSynonym'};const enabled=[];for(const[k,id]of Object.entries(map)){if(document.getElementById(id)?.checked)enabled.push(k)}return enabled.length>0?enabled:['wordToDef']}

(wordObj);qTextEl.innerHTML=`${isRetry?'<span class="retry-badge">Review</span>':''}<div class="q-sentence">${sentence.replace('_____','<span class="blank">_____</span>')}</div><div style="margin-top:8px;opacity:.55;font-size:.85rem">Select the word that best fills the blank.</div>`;const distractors=getDistractors(wordObj,3,'word');options=[wordObj.w,...distractors];shuffle(options);correctIdx=options.indexOf(wordObj.w)}else if(qType==='synonym'){qTypeEl.textContent='Closest in meaning';qTextEl.innerHTML=`<span class="q-word">${wordObj.w}</span>${isRetry?'<span class="retry-badge">Review</span>':''}<div class="q-pos">${wordObj.p}</div>Which description is closest in meaning?`;const distractors=getDistractors(wordObj,3,'def');options=[wordObj.d,...distractors];shuffle(options);correctIdx=options.indexOf(wordObj.d)}optDiv.innerHTML='';options.forEach((opt,i)=>{const div=document.createElement('div');div.className='option';div.innerHTML=`<span class="letter">${letters[i]}</span><span>${opt}</span>`;div.dataset.idx=i;div.onclick=()=>selectAnswer(i,correctIdx,wordObj,isRetry);optDiv.appendChild(div)});card.dataset.correctIdx=correctIdx;card.dataset.wordJson=JSON.stringify(wordObj);card.dataset.isRetry=isRetry;card.dataset.answered='false'}
function selectAnswer(chosen,correct,wordObj,isRetry){const card=document.getElementById('qCard');if(card.dataset.answered==='true')return;card.dataset.answered='true';const opts=document.querySelectorAll('.option');opts.forEach(o=>o.classList.add('disabled'));opts[correct].classList.add('correct','show-correct');const fb=document.getElementById('feedback');const wIdx=W.findIndex(x=>x.w===wordObj.w);if(chosen===correct){session.score++;session.streak++;state.totalCorrect++;fb.textContent=`Correct.${session.streak>1?` ${session.streak} in a row.`:''}`;fb.className='feedback correct-fb'}else{opts[chosen].classList.add('wrong');session.streak=0;if(wIdx>=0){state.missCount[wIdx]=(state.missCount[wIdx]||0)+1}session.retryQueue.push(wordObj);fb.innerHTML=`Incorrect — <em>${wordObj.w}</em>: ${wordObj.d}`;fb.className='feedback wrong-fb'}state.totalAnswered++;addDailyAnswer(chosen===correct);session.answered.push({word:wordObj.w,def:wordObj.d,correct:chosen===correct});save();updateDailyBanner();document.getElementById('nextBtn').style.display='block'}

let calYear,calMonth;
(function(){const now=new Date();calYear=now.getFullYear();calMonth=now.getMonth()})();
function renderCalendar(){const cv=document.getElementById('calendarView');const now=new Date();const todayStr=todayKey();const streak=calcStreak();const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];const firstDay=new Date(calYear,calMonth,1).getDay();const daysInMonth=new Date(calYear,calMonth+1,0).getDate();let dayCells='';DAYS.forEach(d=>{dayCells+=`<div class="cal-hdr">${d}</div>`});for(let i=0;i<firstDay;i++)dayCells+=`<div class="cal-day empty"></div>`;for(let d=1;d<=daysInMonth;d++){const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const log=state.dailyLog[dateStr];const isToday=dateStr===todayStr;const isFuture=new Date(calYear,calMonth,d)>now;const answered=log?.answered||0;const pct=Math.min(100,Math.round(answered/DAILY_GOAL*100));const isDone=answered>=DAILY_GOAL;let inner=`<div class="cd-num">${d}</div>`;if(!isFuture&&answered>0){inner+=`<div class="cd-fill"><div class="cd-fill-inner ${isDone?'full':''}" style="width:${pct}%"></div></div>`;if(isDone)inner+=`<div class="cd-check">&#10003;</div>`;else inner+=`<div class="cd-count">${answered}</div>`}else if(!isFuture){inner+=`<div class="cd-fill"><div class="cd-fill-inner" style="width:0"></div></div>`}dayCells+=`<div class="cal-day${isToday?' today':''}${isFuture?' future':''}">${inner}</div>`}let completedDays=0,totalDaysWorked=0;for(let d=1;d<=daysInMonth;d++){const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const log=state.dailyLog[dateStr];if(log&&log.answered>0)totalDaysWorked++;if(log&&log.answered>=DAILY_GOAL)completedDays++}cv.innerHTML=`<div class="streak-display"><div class="streak-num">${streak}</div><div class="streak-label">${streak===1?'Day':'Days'} streak</div><div class="streak-best">Best: ${state.bestStreak} day${state.bestStreak!==1?'s':''}</div></div><div class="cal"><h2>Daily Practice Log</h2><p class="cal-sub">${DAILY_GOAL} words per day to maintain your streak</p><div class="cal-nav"><button onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--}renderCalendar()">&larr;</button><span class="cal-month">${MONTHS[calMonth]} ${calYear}</span><button onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++}renderCalendar()">&rarr;</button></div><div class="cal-grid">${dayCells}</div><div class="cal-legend"><span><span class="leg-box leg-teal"></span> In progress</span><span><span class="leg-box leg-gold"></span> Completed (${DAILY_GOAL}+)</span><span>${completedDays} of ${totalDaysWorked||daysInMonth} days completed</span></div></div>`}
function showView(v){document.getElementById('quizView').classList.toggle('hidden',v!=='quiz');document.getElementById('calendarView').classList.toggle('hidden',v!=='calendar');document.getElementById('reviewView').classList.toggle('hidden',v!=='review');document.getElementById('statsView').classList.toggle('hidden',v!=='stats');document.getElementById('navQuiz').classList.toggle('active',v==='quiz');document.getElementById('navCal').classList.toggle('active',v==='calendar');document.getElementById('navReview').classList.toggle('active',v==='review');document.getElementById('navStats').classList.toggle('active',v==='stats');if(v==='stats')renderStats();if(v==='review')renderReview();if(v==='calendar')renderCalendar();if(v==='quiz'){updateWordPoolInfo();updateDailyBanner()}}
function updateWordPoolInfo(){const missedCount=Object.keys(state.missCount).length;document.getElementById('wordPoolInfo').textContent=`${W.length} words in rotation${missedCount>0?` · ${missedCount} missed`:''}`}
document.addEventListener('keydown',e=>{if(document.getElementById('quizActive').classList.contains('hidden'))return;const card=document.getElementById('qCard');const key=e.key.toLowerCase();if(key==='escape'){exitSession();return}if(card.dataset.answered==='false'){let idx=-1;if(key==='1'||key==='a')idx=0;if(key==='2'||key==='b')idx=1;if(key==='3'||key==='c')idx=2;if(key==='4'||key==='d')idx=3;if(idx>=0){const correct=parseInt(card.dataset.correctIdx);const wordObj=JSON.parse(card.dataset.wordJson);const isRetry=card.dataset.isRetry==='true';selectAnswer(idx,correct,wordObj,isRetry)}}else if(key==='enter'||key===' '){e.preventDefault();nextQuestion()}});
document.getElementById('wordCount').textContent=`${W.length} entries in the lexicon`;
syncCheckboxes();
updateWordPoolInfo();
updateDailyBanner();
</script>
</body>
</html>
